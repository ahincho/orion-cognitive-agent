# =============================================================================
# ORION Cognitive Agent — Dependabot
# =============================================================================
# Configuracion semanal para mantener al dia:
#   - Dependencias Python (pip / uv) de src/, pyproject.toml, uv.lock
#   - Acciones de GitHub referenciadas en .github/workflows/
#
# Mantener SIMPLE en bootstrap: sin `groups:` (dependabot crea PRs
# individuales por paquete; suficiente para solo-dev). El bloque
# `groups:` puede reintroducirse en un sprint futuro si necesitamos
# agrupar varias updates en un solo PR.
# =============================================================================

version: 2

updates:
  # -----------------------------------------------------------------------------
  # Python dependencies (pyproject.toml + uv.lock).
  # -----------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Lima"
    commit-message:
      prefix: "deps(python)"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    target-branch: "main"

  # -----------------------------------------------------------------------------
  # GitHub Actions versions (referenciadas via `uses: ...@<version>`).
  # -----------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Lima"
    commit-message:
      prefix: "deps(actions)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    target-branch: "main"
