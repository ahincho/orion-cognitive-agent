name: DIAG full cross-owner

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diag-full.yml'

permissions:
  contents: read

jobs:
  diag:
    uses: spark-match/spark-match-01-devops/.github/workflows/diag-full.yml@diag/test-env-isolation
    with:
      environment-name: ci
      python-versions: '"3.12"'
      dependency-groups: 'dev bedrock'
