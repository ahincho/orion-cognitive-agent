# =============================================================================
# ORION Cognitive Agent -- CI Python (thin caller of 01-devops)
# =============================================================================
# Thin caller of `python-ci.yml@main` from spark-match/spark-match-01-devops.
# Replaces the previous bespoke 82-line workflow with a thin reusable call.
#
# Python version is HARDCODED at 3.12 in the recipe (W1 workaround; see
# DIAGNOSTICO-GHA-MATRIX-CROSSOWNER.md). Caller does not pass python-versions.
#
# Concrete QA logic lives at:
#   https://github.com/spark-match/spark-match-01-devops/blob/main/.github/workflows/python-ci.yml
#
# Sprint D smoke (2026-07-21): nothing functional changed -- this commit
# only re-affirms the `@main` pin and the inline reference link after
# spark-match-01-devops#77 promoted Sprint D (P4 docs + 4.3 self-test
# enhancement) from dev to main. See PENDIENTES-CI-CD.md Sprint D.
#
# Sprint B smoke (2026-07-21): same as Sprint D post-promote pattern.
# spark-match-01-devops#79 promoted Sprint B (6 new inputs + 5 new
# commands on python-ci.yml) from dev to main. The caller is already
# on `@main` so the pin automatically picks up the new inputs; this
# smoke trigger cross-owner verification that the default invocation
# (without lock-check, frozen, pytest-args, coverage-threshold, or
# permissions-write) still produces a green run on the canonical
# orion-cognitive-agent layout. See PENDIENTES-CI-CD.md Sprint B.
# =============================================================================

name: CI Python

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/workflows/ci-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/workflows/ci-python.yml'

concurrency:
  group: ci-py-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa:
    uses: spark-match/spark-match-01-devops/.github/workflows/python-ci.yml@main
    with:
      environment-name: ci
      dependency-groups: 'dev bedrock'
      commands: lint:ruff-format,lint:ruff-check,typecheck:mypy,test:pytest,coverage:upload
