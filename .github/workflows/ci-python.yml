# =============================================================================
# ORION Cognitive Agent -- CI Python (thin caller of 01-devops)
# =============================================================================
# Thin caller of `python-ci.yml@dev` from spark-match/spark-match-01-devops.
# Replaces the previous bespoke 82-line workflow with a thin reusable call.
#
# Concrete QA logic lives at:
#   https://github.com/spark-match/spark-match-01-devops/blob/dev/.github/workflows/python-ci.yml
# =============================================================================

name: CI Python

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/workflows/ci-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - '.github/workflows/ci-python.yml'

concurrency:
  group: ci-py-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa:
    uses: spark-match/spark-match-01-devops/.github/workflows/python-ci.yml@main
    with:
      environment-name: ci
      python-versions: '"3.12"'
      dependency-groups: 'dev bedrock'
      commands: lint:ruff-format,lint:ruff-check,typecheck:mypy,test:pytest,coverage:upload
      timeout-minutes: 30
      cache-suffix: 'sanity-${{ github.run_id }}'
