# =============================================================================
# ORION Cognitive Agent -- CD (Deploy Dev) (thin caller of 01-devops)
# =============================================================================
# Thin caller of `container-deploy-ecr.yml@dev` from
# spark-match/spark-match-01-devops. Replaces the prior bespoke 141-line
# workflow (docker build + ECR push + OIDC) with a thin dispatch.
#
# Concrete deploy logic (Dockerfile, ECR login, OIDC assume role, buildx
# cache, image tagging, sticky PR comment on failure) lives at:
#   https://github.com/spark-match/spark-match-01-devops/blob/dev/.github/workflows/container-deploy-ecr.yml
#
# Required GitHub Secret (env-scoped to `dev`):
#   AGENT_DEPLOY_ROLE_ARN -- OIDC role provisioned by orion-infrastructure
#                          (module.iam_orion_agent_core_deploy). Trust
#                          restricts it to
#                          repo:ahincho/orion-cognitive-agent:ref:refs/heads/main.
# =============================================================================

name: CD - Deploy Dev

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.python-version'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/cd-deploy-dev.yml'
  workflow_dispatch:
    inputs:
      image_tag_override:
        description: "Optional override of the docker image tag (default: latest + git sha)."
        required: false
        type: string

# OIDC tokens are mandatory for configure-aws-credentials. The reusable
# workflow forwards them via the caller's permissions context.
permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-deploy-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-dev:
    uses: spark-match/spark-match-01-devops/.github/workflows/container-deploy-ecr.yml@main
    with:
      environment-name: dev
      ecr-repository: orion-agent-core-dev
      dockerfile-path: Dockerfile
      context-path: .
      platforms: linux/arm64
      cache-scope: agentcore-dev
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AGENT_DEPLOY_ROLE_ARN }}
